backend:
  name: git-gateway
  branch: main

media_folder: "public/images/blog"
public_folder: "/images/blog"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "public/blog"
    create: true
    slug: "{{slug}}"
    extension: "json"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "string", hint: "e.g. Local business, Reputation, Growth strategy" }
      - { label: "Description", name: "description", widget: "text", hint: "Short summary shown on the card (1-2 sentences)" }
      - { label: "Read Time", name: "readTime", widget: "string", default: "5 min read" }
      - { label: "Body", name: "fullContent", widget: "markdown" }
      - { label: "Coming Soon", name: "comingSoon", widget: "boolean", default: false, required: false }
      - { label: "Published Date", name: "date", widget: "datetime" }
