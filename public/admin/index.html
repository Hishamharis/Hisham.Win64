<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager — MHH Studio</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    /*
     * Minimal dark theme for Decap CMS.
     * Only targets root-level backgrounds and the top bar —
     * leaves CMS component internals untouched to avoid layout breakage.
     */
    body {
      background: #111213 !important;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif !important;
    }

    /* Top navigation bar */
    header[class*="AppHeader"],
    nav[class*="AppHeader"],
    [data-testid="app-header"] {
      background: #161718 !important;
      border-bottom: 1px solid rgba(255,255,255,0.06) !important;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111213; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
